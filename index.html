<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Web Proxy</title>
  <style>
    body {font-family: Arial, sans-serif; margin: 2rem;}
    input {width: 80%; padding: 0.5rem;}
    button {padding: 0.5rem 1rem;}
    iframe {width: 100%; height: 80vh; border: none; margin-top: 1rem;}
  </style>
</head>
<body>
  <h2>Simple Proxy</h2>
  <form id="proxyForm">
    <input type="text" id="targetUrl" placeholder="Enter URL (e.g., https://example.com)" required />
    <button type="submit">Go</button>
  </form>

  <iframe id="proxyFrame" src=""></iframe>

  <script>
    const form = document.getElementById('proxyForm');
    const iframe = document.getElementById('proxyFrame');

    form.addEventListener('submit', e => {
      e.preventDefault();
      const url = encodeURIComponent(document.getElementById('targetUrl').value.trim());
      // Adjust the path if your proxy endpoint differs
      iframe.src = /proxy?url=${url};
    });
  </script>
</body>
</html>
